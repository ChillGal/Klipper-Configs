# This file contains pin mappings for the Creality CR-10S Pro V2. To use
# this config, the firmware should be compiled for the AVR atmega2560.

# See docs/Config_Reference.md for a description of parameters.

[include mainsail.cfg]
[include macros.cfg]

[save_variables]
filename: ~/variables.cfg

## General Config
[mcu]
serial: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_AM00N46N-if00-port0

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 1500
max_z_velocity: 10
max_z_accel: 100

## Stepper Motors and Extruder
[stepper_x]
step_pin: PF0 #ar54
dir_pin: PF1 #ar55
enable_pin: !PD7 #!ar38
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: ^PE5 #^ar3
position_endstop: 0
position_min: 0
position_max: 300
homing_speed: 75
homing_retract_dist: 5

[stepper_y]
step_pin: PF6 #ar60
dir_pin: !PF7 #ar61
enable_pin: !PF2 #!ar56
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: ^PJ1 #^ar14
position_endstop: 0
position_min: 0
position_max: 310
homing_speed: 75
homing_retract_dist: 5

[stepper_z]
step_pin: PL3 #ar46
dir_pin: !PL1 #!ar48
enable_pin: !PK0 #!ar62
rotation_distance: 8
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_min: -3
position_max: 380 # you can go higher but then the cables crimp

[extruder]
step_pin: PA4 # ar26
dir_pin: PA6 # !ar28
enable_pin: !PA2 # !ar24
rotation_distance: 22.9
microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
# max_extrude_only_distance: 500.0
# max_extrude_only_velocity: 70.0
# max_extrude_only_accel: 1000.0
heater_pin: PB4 #ar10
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK5 #analog13
#control: pid #calibrated in Klipper, you will need to run this for your machine
#pid_kp: 28.359
#pid_ki: 1.616
#pid_kd: 124.426
# 21/10/2025 - pid_Kp=29.088 pid_Ki=1.616 pid_Kd=130.898
min_extrude_temp: 170
min_temp: 5
max_temp: 275


[fan]
pin: PH6 #ar9

[heater_bed]
heater_pin: PH5 #ar8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK6 #analog14
#control: pid #calibrated in Klipper, you will need to run this for your machine
# pid_kp: 70.936
# pid_ki: 1.151
# pid_kd: 1093.298
# 21/10/2025 - pid_Kp=70.936 pid_Ki=1.412 pid_Kd=891.131
min_temp: 5
max_temp: 140

## BLTouch and Safe Z Settings
[bltouch]
sensor_pin: ^PD2 # ^PD2 for Z-Max pin, ^PD3 for Z-Min pin
control_pin: PB5
stow_on_each_sample: False # Be careful
#probe_with_touch_mode: True
x_offset: -39.5 # 47
y_offset: -5    # 20 
# Increase Z_Offset to lower nozzle closer to bed. PLA 2.6
#z_offset: 2.656 # you will need to calibrate this in Klipper
speed: 5
samples: 5
samples_tolerance_retries: 3
sample_retract_dist: 3.0
pin_move_time: 0.2
pin_up_reports_not_triggered: False
pin_up_touch_mode_reports_triggered: False

[safe_z_home]
home_xy_position: 177,155
speed: 80.0
z_hop: 12.0
z_hop_speed: 5.0

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 10, 10 # Default: 5, 5
mesh_max: 250, 290 # Default: 268, 305
mesh_pps: 2, 2
probe_count: 5,5
fade_start: 1
fade_end: 10
fade_target: 0
algorithm: lagrange # Can also choose bicubic

[filament_switch_sensor e0_sensor]
switch_pin: PE4 #ar2
pause_on_runout: True
runout_gcode:
  PAUSE_PARK

## Calibrating the Bed
# this is for the bltouch to calibrate the bed
[screws_tilt_adjust]
screw1: 40,40
screw1_name: front left screw
screw2: 295,40
screw2_name: front right screw
screw3: 295,280
screw3_name: rear right screw
screw4: 40,280
screw4_name: rear left screw
speed: 50
horizontal_move_z: 10
screw_thread: CW-M3

[bed_screws]
screw1: 13,38
screw1_name: front left screw
screw2: 268,38
screw2_name: front right screw
screw3: 268,278
screw3_name: rear right screw
screw4: 13,38
screw4_name: rear left screw
horizontal_move_z: 5

[pause_resume]

[respond]
default_type: echo

