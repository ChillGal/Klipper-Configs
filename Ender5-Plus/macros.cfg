[gcode_macro G29_Load_Default_Bed_Mesh]
description: Load default bed mesh
gcode:
    BED_MESH_PROFILE LOAD=default
    RESPOND MSG="Loaded default bed mesh"


[gcode_macro Set_Extruder_E0]
gcode:
    ACTIVATE_EXTRUDER EXTRUDER=extruder

[gcode_macro Set_Extruder_E1]
gcode:
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
